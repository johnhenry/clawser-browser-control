name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest
        run: |
          node -e "
            const m = JSON.parse(require('fs').readFileSync('manifest.json', 'utf8'));
            console.log('Name:', m.name);
            console.log('Version:', m.version);
            console.log('MV:', m.manifest_version);
            if (m.manifest_version !== 3) throw new Error('Expected MV3');
            if (!m.background?.service_worker) throw new Error('Missing service worker');
            console.log('Manifest valid');
          "

      - name: Check required files exist
        run: |
          test -f background.js || (echo "Missing background.js" && exit 1)
          test -f content.js || (echo "Missing content.js" && exit 1)
          test -f pod-inject.js || (echo "Missing pod-inject.js" && exit 1)
          test -f icons/icon-16.png || (echo "Missing icon-16" && exit 1)
          test -f icons/icon-48.png || (echo "Missing icon-48" && exit 1)
          test -f icons/icon-128.png || (echo "Missing icon-128" && exit 1)
          echo "All required files present"

      - name: Build zip (dry run)
        run: |
          mkdir -p dist
          zip -r dist/clawser-browser-control.zip \
            manifest.json background.js content.js pod-inject.js icons/ \
            -x "*.DS_Store"
          ls -lh dist/clawser-browser-control.zip
