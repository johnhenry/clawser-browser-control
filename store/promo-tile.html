<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 440px; height: 280px;
    background: linear-gradient(135deg, #0a1628 0%, #132744 40%, #1a3a5c 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #e8f0f8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    overflow: hidden;
    position: relative;
  }
  .bg-glow {
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(137,190,213,0.12) 0%, transparent 70%);
    top: -80px; right: -60px;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 1;
  }
  .logo-row img {
    width: 56px; height: 56px;
    border-radius: 12px;
    background: #fff;
    padding: 6px;
  }
  .logo-text {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
    color: #fff;
  }
  .tagline {
    font-size: 15px;
    color: #89bed5;
    font-weight: 500;
    text-align: center;
    max-width: 360px;
    line-height: 1.4;
    z-index: 1;
  }
  .pills {
    display: flex;
    gap: 8px;
    z-index: 1;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 400px;
  }
  .pill {
    background: rgba(137,190,213,0.12);
    border: 1px solid rgba(137,190,213,0.25);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: #c0d8e8;
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="logo-row">
    <img src="/icon-128.png" alt="Clawser">
    <span class="logo-text">Clawser</span>
  </div>
  <div class="tagline">AI agent browser control — tabs, DOM, screenshots, input & monitoring</div>
  <div class="pills">
    <span class="pill">Screenshots</span>
    <span class="pill">Tab Control</span>
    <span class="pill">DOM Access</span>
    <span class="pill">Input Simulation</span>
    <span class="pill">Network Monitor</span>
  </div>
</body>
</html>
